name: Keep Alive

# Pings the deployed backend on a schedule so the Bonto app
# doesn't go to sleep from inactivity.

on:
  schedule:
    # Every 10 minutes (UTC). GitHub may delay runs under load.
    - cron: "*/10 * * * *"
  workflow_dispatch: # allows manual trigger from the Actions tab

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping health endpoint
        run: |
          echo "Pinging backend at $(date -u)"
          code=$(curl -s -o /dev/null -w "%{http_code}" --max-time 30 https://ecom-task-backend.bonto.run/health)
          echo "HTTP status: $code"
          if [ "$code" != "200" ]; then
            echo "Health check failed with status $code"
            exit 1
          fi
          echo "Backend is awake."
